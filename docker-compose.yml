services:
  web:
    image: nginx:alpine
    container_name: sostlanding
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sostlanding.rule=Host(`sostlanding.mattiagirellini.com`)"
      - "traefik.http.routers.sostlanding.tls=true"
      - "traefik.http.routers.sostlanding.tls.certresolver=letsencrypt"
      - "traefik.http.services.sostlanding.loadbalancer.server.port=80"

networks:
  web:
    external: true